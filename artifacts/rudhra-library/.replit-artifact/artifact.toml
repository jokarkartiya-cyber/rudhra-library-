kind = "web"
previewPath = "/"
title = "Rudhra Library"
version = "1.0.0"
id = "artifacts/rudhra-library"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19790

[services.development]
run = "pnpm --filter @workspace/rudhra-library run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rudhra-library", "run", "build" ]
publicDir = "artifacts/rudhra-library/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19790"
BASE_PATH = "/"
