services:
  - type: web
    name: rudhra-api
    env: node
    buildCommand: pnpm install && pnpm run build --filter @workspace/api-server
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
